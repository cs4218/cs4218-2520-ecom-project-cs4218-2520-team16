name: Run Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout respository
        uses: actions/checkout@v5

      - name: Set up Node.js 
        uses: actions/setup-node@v5
        with: 
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install client dependencies
        run: | 
          cd client
          npm install
      - name: Run Jest Tests
        run: npm run test:frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright UI Tests
        run: npm run test:ui:ci

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  load-test-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check smoke-test prerequisites
        id: smoke_gate
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: |
          if [ -n "$MONGO_URL" ]; then
            echo "run_load_test=true" >> "$GITHUB_OUTPUT"
            echo "MONGO_URL is configured; running smoke load test."
          else
            echo "run_load_test=false" >> "$GITHUB_OUTPUT"
            echo "MONGO_URL is not configured; skipping smoke load test."
          fi

      - name: Checkout repository
        if: ${{ steps.smoke_gate.outputs.run_load_test == 'true' }}
        uses: actions/checkout@v5

      - name: Set up Node.js
        if: ${{ steps.smoke_gate.outputs.run_load_test == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        if: ${{ steps.smoke_gate.outputs.run_load_test == 'true' }}
        run: npm install

      - name: Install client dependencies
        if: ${{ steps.smoke_gate.outputs.run_load_test == 'true' }}
        run: |
          cd client
          npm install

      - name: Start backend
        if: ${{ steps.smoke_gate.outputs.run_load_test == 'true' }}
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEV_MODE: github-actions
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:6060/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat server.log
          exit 1

      - name: Run smoke load test
        if: ${{ steps.smoke_gate.outputs.run_load_test == 'true' }}
        run: npm run test:load:smoke

      - name: Upload backend log
        if: ${{ always() && steps.smoke_gate.outputs.run_load_test == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: load-test-backend-log
          path: server.log
          retention-days: 14
